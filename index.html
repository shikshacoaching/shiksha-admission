<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiksha - Student Portal</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #eef4ff;
            --primary-dark: #000033;
            --text-gray: #555;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; /* Prevent double scrollbars */
        }

        /* Container for the Login Interface */
        #main-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            transition: opacity 0.5s ease;
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo {
            width: 130px;
            height: 130px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .brand-name {
            font-size: 32px;
            color: #002366;
            font-weight: 800;
            margin: 15px 0 5px 0;
            letter-spacing: 1.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #002366;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .login-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative;
            text-align: center;
        }

        /* Admin Access Icon */
        .admin-access {
            position: absolute;
            top: 20px;
            right: 25px;
            text-decoration: none;
            color: #333;
            cursor: pointer;
        }
        .admin-access i { font-size: 26px; }
        .admin-access span { display: block; font-size: 10px; font-weight: bold; margin-top: 2px; }

        .login-title {
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0 30px 0;
            color: #000;
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-box input {
            width: 100%;
            padding: 16px 15px 16px 45px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        .login-btn {
            width: 100%;
            background-color: var(--primary-dark);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover { background-color: #000; }

        .footer-text {
            margin-top: 60px;
            font-size: 13px;
            color: #666;
        }

        /* Full Screen Portal View */
        #portal-container {
            display: none;
            height: 100vh;
            width: 100vw;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 12px;
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- UI View -->
    <div id="main-ui">
        <div class="header-section">
            <img src="https://iili.io/qkieRf9.png" alt="Logo" class="logo">
            <div class="brand-name">Shiksha</div>
            <div class="subtitle">(A CAREER INSTITUTE OF ARTS)</div>
        </div>

        <div class="login-card">
            <!-- Admin Access -> Verification Portal -->
            <div class="admin-access" onclick="openPortal('verification')">
                <i class="fa-solid fa-building-columns"></i>
                <span>Admin Access</span>
            </div>

            <div class="login-title">STUDENT LOGIN</div>

            <div class="input-box">
                <i class="fa-regular fa-user"></i>
                <input type="text" placeholder="Enter your Student ID">
            </div>

            <div class="input-box">
                <i class="fa-regular fa-calendar-days"></i>
                <input type="text" placeholder="Date of Birth (DD/MM/YYYY)">
            </div>

            <!-- Login -> Admission Portal -->
            <button class="login-btn" onclick="openPortal('admission')">LOGIN</button>
        </div>

        <div class="footer-text">
            © Copyright 2026 Shiksha. All rights reserved.
        </div>
    </div>

    <!-- Hidden Portal View -->
    <div id="portal-container">
        <div class="back-btn" onclick="closePortal()"><i class="fa-solid fa-arrow-left"></i> Back to Home</div>
        <iframe id="portal-frame" src=""></iframe>
    </div>

    <script>
        const urls = {
            admission: "https://script.google.com/a/~/macros/s/AKfycbyZeg9sALo7jPOKlxyIyqCfD8ar60PZ9uxATToHdh15oKJpKY77RJ7jr4nvJnK7jNiOsw/exec",
            verification: "https://script.google.com/a/~/macros/s/AKfycbwAu0p3Xeezh-sZsvpljcxXyQpd9Dxsrit39MZ7DN7iRYxBwPiUPkHQdqvdUHmMSgAy/exec"
        };

        function openPortal(type) {
            const frame = document.getElementById('portal-frame');
            const mainUI = document.getElementById('main-ui');
            const portalContainer = document.getElementById('portal-container');

            // Set the iframe source to the Google Script
            frame.src = urls[type];

            // Hide UI and show Portal
            mainUI.style.display = 'none';
            portalContainer.style.display = 'block';
        }

        function closePortal() {
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('portal-container').style.display = 'none';
            document.getElementById('portal-frame').src = "";
        }
    </script>
</body>
</html>
